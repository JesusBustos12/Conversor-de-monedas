services:
  # Base de Datos MySQL
  mysql-db:
    image: mysql:8.0
    container_name: currencyhub-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    # ports:
    #   - "3306:3306" # Solo necesario para debugging externo, deshabilitado en PRO
    volumes:
      - mysql-data:/var/lib/mysql
      - ./setup_mysql_pro.sql:/docker-entrypoint-initdb.d/setup_mysql_pro.sql
    networks:
      - currencyhub-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASS}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Aplicación Node.js
  node-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: currencyhub-app
    restart: always
    depends_on:
      mysql-db:
        condition: service_healthy
    env_file:
      - ./server/.env
    environment:
      DB_HOST: mysql-db
    networks:
      - currencyhub-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # Nginx Reverse Proxy
  nginx-proxy:
    image: nginx:alpine
    container_name: currencyhub-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - node-app
    networks:
      - currencyhub-net

volumes:
  mysql-data:

networks:
  currencyhub-net:
    driver: bridge
